<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eGain PMM AI Agent</title>
    <!-- MSAL for eGain OAuth login -->
    <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3/lib/msal-browser.min.js"></script>
    <!-- Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Reset & Base ──────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --brand: #B91D8F;
            --brand-hover: #9A1677;
            --brand-light: #FDF2FA;
            --brand-pink: #FEF0FD;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --text-tertiary: #6B7280;
            --bg-primary: #FFFFFF;
            --bg-secondary: #F9FAFB;
            --bg-tertiary: #F3F4F6;
            --border-primary: #E5E7EB;
            --border-secondary: #D1D5DB;
            --success: #16A34A;
            --error: #DC2626;
            --warning: #D97706;
            --info: #2563EB;
            --font-sans: "Helvetica Neue", Helvetica, Arial, -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: "JetBrains Mono", "Fira Code", Consolas, monospace;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-secondary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ────────────────────────────────────────────────── */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-primary);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-logo {
            height: 20px;
            width: auto;
        }

        .header-logo img {
            height: 100%;
            width: auto;
        }

        .header-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-left: 0.5rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .user-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.375rem 0.75rem;
            background: var(--brand-light);
            border-radius: 9999px;
            font-size: 0.8125rem;
            color: var(--brand);
            font-weight: 500;
        }

        .user-badge .dot {
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
        }

        .btn-new-chat {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-secondary);
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            font-family: var(--font-sans);
            font-size: 0.8125rem;
            transition: all 0.15s;
        }

        .btn-new-chat:hover {
            background: var(--bg-tertiary);
            color: var(--brand);
            border-color: var(--brand);
        }

        .btn-logout {
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--border-secondary);
            border-radius: var(--radius);
            background: var(--bg-primary);
            color: var(--text-secondary);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-logout:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* ── Chat Container ────────────────────────────────────────── */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
            overflow: hidden;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.5rem 0.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: var(--border-secondary); border-radius: 4px; }

        /* ── Messages ──────────────────────────────────────────────── */
        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.assistant { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6875rem;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.assistant .message-avatar {
            background: var(--brand);
            color: white;
        }

        .message.user .message-avatar {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .message-content {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.assistant .message-content {
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            color: var(--text-primary);
        }

        .message.user .message-content {
            background: var(--brand);
            color: white;
            border: none;
        }

        /* Markdown rendered content */
        .message-content h1, .message-content h2, .message-content h3 {
            margin: 0.75rem 0 0.375rem;
            font-weight: 600;
            line-height: 1.3;
        }
        .message-content h1 { font-size: 1.125rem; }
        .message-content h2 { font-size: 1rem; }
        .message-content h3 { font-size: 0.9375rem; }
        .message-content p { margin: 0.375rem 0; }
        .message-content ul, .message-content ol {
            margin: 0.375rem 0;
            padding-left: 1.5rem;
        }
        .message-content li { margin: 0.125rem 0; }
        .message-content strong { font-weight: 600; }
        .message-content table {
            border-collapse: collapse;
            margin: 0.5rem 0;
            font-size: 0.8125rem;
            width: 100%;
        }
        .message-content th, .message-content td {
            border: 1px solid var(--border-primary);
            padding: 0.375rem 0.625rem;
            text-align: left;
        }
        .message-content th {
            background: var(--bg-tertiary);
            font-weight: 600;
        }
        .message-content code {
            font-family: var(--font-mono);
            font-size: 0.8125rem;
            background: var(--bg-tertiary);
            padding: 0.125rem 0.375rem;
            border-radius: 4px;
        }
        .message-content pre {
            background: var(--bg-tertiary);
            border-radius: var(--radius);
            padding: 0.75rem;
            overflow-x: auto;
            margin: 0.5rem 0;
        }
        .message-content pre code {
            background: none;
            padding: 0;
        }
        .message-content blockquote {
            border-left: 3px solid var(--brand);
            padding-left: 0.75rem;
            margin: 0.5rem 0;
            color: var(--text-secondary);
        }
        .message-content hr {
            border: none;
            border-top: 1px solid var(--border-primary);
            margin: 0.75rem 0;
        }

        .message.user .message-content code {
            background: rgba(255,255,255,0.2);
        }
        .message.user .message-content th,
        .message.user .message-content td {
            border-color: rgba(255,255,255,0.3);
        }
        .message.user .message-content th {
            background: rgba(255,255,255,0.1);
        }

        /* Copy button */
        .message-wrapper {
            position: relative;
        }

        /* Tool activity indicator */
        .tool-activity {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
            margin-bottom: 0.375rem;
        }

        .tool-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.125rem 0.5rem;
            background: var(--bg-tertiary);
            border-radius: 9999px;
            font-size: 0.6875rem;
            color: var(--text-tertiary);
            font-family: var(--font-mono);
        }

        .tool-chip svg {
            color: var(--brand);
        }

        .btn-copy {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            margin-top: 0.375rem;
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            font-size: 0.6875rem;
            font-family: var(--font-sans);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .btn-copy:hover {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .btn-copy.copied {
            color: var(--success);
        }

        /* ── Typing indicator ──────────────────────────────────────── */
        .typing {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--text-tertiary);
            border-radius: 50%;
            animation: typing 1.2s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-4px); opacity: 1; }
        }

        /* ── Input Area ────────────────────────────────────────────── */
        .input-area {
            padding: 0.75rem 1.5rem 1.25rem;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-xl);
            padding: 0.5rem;
            box-shadow: var(--shadow-sm);
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .input-wrapper:focus-within {
            border-color: var(--brand);
            box-shadow: 0 0 0 3px rgba(185, 29, 143, 0.12);
        }

        .input-wrapper textarea {
            flex: 1;
            border: none;
            outline: none;
            resize: none;
            font-family: var(--font-sans);
            font-size: 0.875rem;
            line-height: 1.5;
            padding: 0.375rem 0.5rem;
            max-height: 120px;
            color: var(--text-primary);
            background: transparent;
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-tertiary);
        }

        .btn-send {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--border-secondary);
            color: white;
            cursor: not-allowed;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .btn-send.active {
            background: var(--brand);
            cursor: pointer;
        }

        .btn-send.active:hover { background: var(--brand-hover); }
        .btn-send:disabled { background: var(--border-secondary); cursor: not-allowed; }

        .btn-send svg {
            width: 16px;
            height: 16px;
        }

        /* ── Login Screen ──────────────────────────────────────────── */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 2rem;
            text-align: center;
        }

        .login-logo {
            height: 40px;
            width: auto;
        }

        .login-logo img {
            height: 100%;
            width: auto;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .login-subtitle {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            max-width: 400px;
            line-height: 1.5;
        }

        .btn-login {
            padding: 0.75rem 2rem;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: var(--radius-lg);
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            box-shadow: var(--shadow-md);
        }

        .btn-login:hover { background: var(--brand-hover); }

        /* ── Status ────────────────────────────────────────────────── */
        .status-bar {
            padding: 0.25rem 1.5rem;
            font-size: 0.6875rem;
            color: var(--text-tertiary);
            text-align: center;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-logo"><img src="assets/egain-logo.svg" alt="eGain"></div>
        <h1 class="login-title">PMM AI Agent</h1>
        <p class="login-subtitle">
            Sign in with your eGain account to manage release notes, portal articles, and documentation.
        </p>
        <button class="btn-login" onclick="login()">Sign in with eGain</button>
        <p id="loginError" class="hidden" style="color: var(--error); font-size: 0.8125rem;"></p>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="hidden" style="display: none; flex-direction: column; height: 100vh;">
        <div class="header">
            <div class="header-left">
                <div class="header-logo"><img src="assets/egain-logo.svg" alt="eGain"></div>
                <span class="header-title">PMM AI Agent</span>
                <span class="header-subtitle">by eGain</span>
            </div>
            <div class="header-right">
                <div class="user-badge">
                    <span class="dot"></span>
                    <span id="userName">—</span>
                </div>
                <button class="btn-new-chat" onclick="newChat()" title="New conversation">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                    <span>New conversation</span>
                </button>
                <button class="btn-logout" onclick="logout()">Sign out</button>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages"></div>
            <div class="status-bar" id="statusBar"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea
                        id="chatInput"
                        placeholder="Ask about releases, features, or portal articles..."
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        oninput="autoResize(this); toggleSendBtn(this)"
                    ></textarea>
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Markdown config ──────────────────────────────────────────
        marked.setOptions({ breaks: true, gfm: true });

        // ── Config ──────────────────────────────────────────────────
        // Backend: localhost for dev, will change for prod
        const API_BASE = window.location.hostname === 'dev.controlflows.com'
            ? 'http://localhost:8000'  // dev — backend runs locally
            : 'http://localhost:8000'; // local — same

        let sessionId = null;
        let egainToken = null;
        let currentUser = null;
        let msalInstance = null;

        // ── MSAL Config (eGain Azure AD B2C) ────────────────────────
        const msalConfig = {
            auth: {
                clientId: '6f082c2d-7e52-4f24-80e5-ae8f04bf9e68',  // SPA client app
                authority: 'https://tmprod11055874int.b2clogin.com/b7e26fea-53ab-4364-afe8-0f73ece65656/B2C_1A_User_V3_SignIn_OIDC',
                knownAuthorities: ['tmprod11055874int.b2clogin.com'],
                redirectUri: window.location.origin + window.location.pathname,
                authorityMetadata: JSON.stringify({
                    authorization_endpoint: 'https://tmprod11055874int.b2clogin.com/b7e26fea-53ab-4364-afe8-0f73ece65656/B2C_1A_User_V3_SignIn_OIDC/oauth2/v2.0/authorize',
                    token_endpoint: 'https://tmprod11055874int.b2clogin.com/b7e26fea-53ab-4364-afe8-0f73ece65656/B2C_1A_User_V3_SignIn_OIDC/oauth2/v2.0/token',
                    issuer: 'https://tmprod11055874int.b2clogin.com/b7e26fea-53ab-4364-afe8-0f73ece65656/B2C_1A_User_V3_SignIn_OIDC/v2.0/',
                    jwks_uri: 'https://tmprod11055874int.b2clogin.com/b7e26fea-53ab-4364-afe8-0f73ece65656/B2C_1A_User_V3_SignIn_OIDC/discovery/v2.0/keys',
                }),
                navigateToLoginRequestUrl: true,
            },
            cache: { cacheLocation: 'sessionStorage' },
            system: {
                allowRedirectInIframe: true,
                loggerOptions: {
                    loggerCallback: (level, message, containsPii) => {
                        if (!containsPii) console.log(`MSAL [${level}]: ${message}`);
                    },
                    piiLoggingEnabled: false,
                    logLevel: msal.LogLevel.Warning,
                },
            },
        };

        const loginRequest = {
            scopes: ['https://tmprod11055874int.onmicrosoft.com/12bf53d5-dc02-429f-bc2b-d8707c60e69d/.default'],
            extraQueryParameters: {
                domain_hint: 'ebrain.egain.com',
            },
        };

        // ── MSAL Init ───────────────────────────────────────────────
        async function initMsal() {
            msalInstance = new msal.PublicClientApplication(msalConfig);
            await msalInstance.initialize();

            // Handle redirect response (if coming back from login)
            const response = await msalInstance.handleRedirectPromise();
            if (response?.account) {
                console.log('Login redirect response received');
                msalInstance.setActiveAccount(response.account);
                await onLoginSuccess(response.accessToken);
            } else {
                // Check for existing session
                const accounts = msalInstance.getAllAccounts();
                if (accounts.length > 0) {
                    msalInstance.setActiveAccount(accounts[0]);
                    try {
                        const tokenResp = await msalInstance.acquireTokenSilent({
                            ...loginRequest,
                            account: accounts[0],
                        });
                        await onLoginSuccess(tokenResp.accessToken);
                    } catch (e) {
                        console.log('Silent token failed, need interactive login');
                    }
                }
            }
        }

        // ── Auth ────────────────────────────────────────────────────
        async function login() {
            try {
                document.getElementById('loginError').textContent = 'Signing in...';
                document.getElementById('loginError').classList.remove('hidden');

                // Ensure MSAL is initialized
                if (!msalInstance) {
                    await initMsal();
                }

                const response = await msalInstance.loginPopup(loginRequest);
                msalInstance.setActiveAccount(response.account);
                await onLoginSuccess(response.accessToken);
            } catch (err) {
                console.error('Login failed:', err);
                document.getElementById('loginError').textContent = `Login failed: ${err.message}`;
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        async function onLoginSuccess(token) {
            egainToken = token;

            // Extract user info from MSAL account + token claims
            const account = msalInstance.getActiveAccount();
            const claims = account?.idTokenClaims || {};
            console.log('MSAL account:', account);
            console.log('Token claims:', claims);

            // Try to get name from various claim fields
            const name = claims.name
                || claims.given_name && claims.family_name && `${claims.given_name} ${claims.family_name}`
                || account?.name
                || null;

            const email = claims.email || claims.emails?.[0] || account?.username || null;

            if (name) {
                currentUser = name;
            } else if (email) {
                // Ask backend to resolve email → PM name
                try {
                    const resp = await fetch(`${API_BASE}/pm/resolve?email=${encodeURIComponent(email)}`);
                    if (resp.ok) {
                        const data = await resp.json();
                        currentUser = data.name || email;
                    } else {
                        currentUser = email.split('@')[0];
                    }
                } catch (e) {
                    currentUser = email.split('@')[0];
                }
            } else {
                currentUser = 'PM';
            }

            console.log('User resolved:', currentUser, 'email:', email);

            document.getElementById('userName').textContent = currentUser;

            // Show chat, hide login
            document.getElementById('loginScreen').classList.add('hidden');
            const chatScreen = document.getElementById('chatScreen');
            chatScreen.classList.remove('hidden');
            chatScreen.style.display = 'flex';

            // Start session with PM name
            await startSession(currentUser);
        }

        async function refreshToken() {
            try {
                const account = msalInstance.getActiveAccount();
                if (!account) {
                    handleTokenExpiry();
                    return null;
                }
                const response = await msalInstance.acquireTokenSilent({
                    ...loginRequest,
                    account: account,
                });
                egainToken = response.accessToken;
                return egainToken;
            } catch (e) {
                console.error('Token refresh failed:', e);
                handleTokenExpiry();
                return null;
            }
        }

        function handleTokenExpiry() {
            addMessage('assistant', '⚠️ Your session has expired. Please sign in again.');
            setTimeout(() => logout(), 2000);
        }

        function logout() {
            if (sessionId) {
                fetch(`${API_BASE}/sessions/${sessionId}/end`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ reason: 'logout' }),
                }).catch(() => {});
            }
            sessionId = null;
            egainToken = null;
            currentUser = null;
            document.getElementById('chatScreen').style.display = 'none';
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('messages').innerHTML = '';
            document.getElementById('loginError').classList.add('hidden');
            if (msalInstance) {
                msalInstance.logoutPopup({ postLogoutRedirectUri: window.location.origin + window.location.pathname });
            }
        }

        // Init MSAL on page load
        initMsal().catch(err => console.warn('MSAL init:', err.message));

        // ── Session ─────────────────────────────────────────────────
        async function startSession(pmName) {
            setStatus('Starting session...');
            showTyping();
            try {
                const resp = await fetch(`${API_BASE}/sessions/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(egainToken ? { 'X-Egain-Token': egainToken } : {}),
                    },
                    body: JSON.stringify({ pm_name: pmName }),
                });
                removeTyping();
                const data = await resp.json();
                sessionId = data.session_id;
                addMessage('assistant', data.message);
                setStatus('');
            } catch (err) {
                removeTyping();
                addMessage('assistant', `Error connecting to server: ${err.message}. Is the backend running on ${API_BASE}?`);
                setStatus('Disconnected');
            }
        }

        // ── Chat ────────────────────────────────────────────────────
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !sessionId) return;
            const sendBtn = document.getElementById('sendBtn');
            if (!sendBtn.classList.contains('active')) return;

            // Show user message
            addMessage('user', text);
            input.value = '';
            autoResize(input);

            // Disable input while waiting
            sendBtn.disabled = true;
            sendBtn.classList.remove('active');
            showTyping();
            setStatus('Thinking...');

            try {
                // Refresh token if needed
                await refreshToken();
                const resp = await fetch(`${API_BASE}/sessions/${sessionId}/respond`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        ...(egainToken ? { 'X-Egain-Token': egainToken } : {}),
                    },
                    body: JSON.stringify({ input: text }),
                });
                const data = await resp.json();
                removeTyping();
                addMessage('assistant', data.message, data.tools_called);
                setStatus('');
            } catch (err) {
                removeTyping();
                addMessage('assistant', `Error: ${err.message}`);
                setStatus('Error');
            }

            sendBtn.disabled = false;
            input.focus();
        }

        // ── UI Helpers ──────────────────────────────────────────────
        function addMessage(role, text, toolsCalled) {
            const messages = document.getElementById('messages');
            const initials = role === 'assistant' ? 'AI' : (currentUser || 'PM').split(' ').map(n => n[0]).join('').toUpperCase();

            const div = document.createElement('div');
            div.className = `message ${role}`;

            // Render markdown for assistant, plain text for user
            const renderedContent = role === 'assistant'
                ? marked.parse(text)
                : escapeHtml(text);

            // Tool activity chips (only for assistant with tool calls)
            let toolChips = '';
            if (role === 'assistant' && toolsCalled && toolsCalled.length > 0) {
                const chips = toolsCalled.map(tc => {
                    const argStr = Object.entries(tc.args || {})
                        .filter(([k,v]) => v)
                        .map(([k,v]) => `${k}=${v}`)
                        .join(', ');
                    return `<span class="tool-chip">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                        </svg>
                        ${tc.tool}${argStr ? '(' + argStr + ')' : ''}
                    </span>`;
                }).join('');
                toolChips = `<div class="tool-activity">${chips}</div>`;
            }

            const copyBtn = role === 'assistant'
                ? `<button class="btn-copy" onclick="copyMessage(this, ${JSON.stringify(text).replace(/"/g, '&quot;')})">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                    </svg>
                    Copy
                   </button>`
                : '';

            div.innerHTML = `
                <div class="message-avatar">${initials}</div>
                <div class="message-wrapper">
                    ${toolChips}
                    <div class="message-content">${renderedContent}</div>
                    ${copyBtn}
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function copyMessage(btn, text) {
            navigator.clipboard.writeText(text).then(() => {
                btn.classList.add('copied');
                btn.innerHTML = `
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    Copied!
                `;
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.innerHTML = `
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                        </svg>
                        Copy
                    `;
                }, 2000);
            });
        }

        function showTyping() {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="message-avatar">AI</div>
                <div class="message-content"><div class="typing"><span></span><span></span><span></span></div></div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        function setStatus(text) {
            document.getElementById('statusBar').textContent = text;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        function toggleSendBtn(textarea) {
            const btn = document.getElementById('sendBtn');
            if (textarea.value.trim()) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        async function newChat() {
            // End current session
            if (sessionId) {
                try {
                    await fetch(`${API_BASE}/sessions/${sessionId}/end`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ reason: 'restarted' }),
                    });
                } catch (e) { /* ignore */ }
            }
            // Clear chat and start fresh
            document.getElementById('messages').innerHTML = '';
            sessionId = null;
            await startSession(currentUser);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
